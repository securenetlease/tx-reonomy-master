<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TX Reonomy Master Export</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --font-body: 'DM Sans', sans-serif;
    --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
    --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
    --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
    --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem;
    --space-4: 1rem; --space-5: 1.25rem; --space-6: 1.5rem;
    --radius-sm: 0.375rem; --radius-md: 0.5rem; --radius-lg: 0.75rem;
    --radius-full: 9999px;
    --shadow-sm: 0 1px 4px rgba(0,0,0,0.10);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.13);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.18);
    --toolbar-bg: rgba(255,255,255,0.88);
    --toolbar-border: rgba(0,0,0,0.09);
    --color-text: #1e2229;
    --color-text-muted: #7a7e88;
    --color-primary: #3a7bd5;
    --color-surface: #f7f8fb;
    --color-divider: #e2e5ec;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: var(--font-body); overflow: hidden; }
  body { display: flex; flex-direction: column; background: #e8ecf0; }

  #toolbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1100;
    height: 58px; display: flex; align-items: center; gap: var(--space-3);
    padding: 0 var(--space-5);
    background: var(--toolbar-bg);
    backdrop-filter: blur(14px) saturate(1.4);
    -webkit-backdrop-filter: blur(14px) saturate(1.4);
    border-bottom: 1px solid var(--toolbar-border);
    box-shadow: var(--shadow-md);
  }
  #toolbar-title {
    font-size: var(--text-sm); font-weight: 700; color: var(--color-text);
    white-space: nowrap; letter-spacing: -0.01em;
    display: flex; align-items: center; gap: var(--space-2); flex-shrink: 0;
  }
  #search-wrap { position: relative; flex: 1; max-width: 320px; min-width: 100px; }
  #search-input {
    width: 100%; padding: 6px 32px 6px 32px;
    border: 1.5px solid var(--color-divider); border-radius: var(--radius-full);
    font-size: var(--text-xs); font-family: var(--font-body);
    background: rgba(255,255,255,0.7); color: var(--color-text); outline: none;
    transition: border 0.18s;
  }
  #search-input:focus { border-color: var(--color-primary); background: #fff; }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--color-text-muted); }
  #search-clear {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; color: var(--color-text-muted);
    display: none; padding: 2px; line-height: 1; font-size: 12px;
  }
  #search-dropdown {
    position: absolute; top: calc(100% + 6px); left: 0; right: 0;
    background: #fff; border: 1px solid var(--color-divider);
    border-radius: var(--radius-md); box-shadow: var(--shadow-md);
    max-height: 240px; overflow-y: auto; z-index: 2000; display: none;
  }
  .search-result-item {
    padding: 8px 14px; font-size: var(--text-xs); cursor: pointer;
    color: var(--color-text); transition: background 0.12s;
    display: flex; align-items: flex-start; gap: 8px;
  }
  .search-result-item:hover { background: #f0f4ff; }
  .sri-type { font-size: 10px; color: var(--color-text-muted); }

  #filter-wrap { position: relative; flex-shrink: 0; }
  #filter-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 6px 12px; border: 1.5px solid var(--color-divider);
    border-radius: var(--radius-full); font-size: var(--text-xs);
    font-family: var(--font-body); background: rgba(255,255,255,0.7);
    color: var(--color-text); cursor: pointer; white-space: nowrap;
    transition: border 0.18s, background 0.18s;
  }
  #filter-btn:hover { border-color: var(--color-primary); background: #fff; }
  #filter-badge {
    background: var(--color-primary); color: #fff;
    border-radius: var(--radius-full); padding: 0 6px;
    font-size: 10px; font-weight: 700; display: none;
  }
  #filter-panel {
    position: absolute; top: calc(100% + 8px); left: 0; min-width: 200px;
    background: #fff; border: 1px solid var(--color-divider);
    border-radius: var(--radius-md); box-shadow: var(--shadow-lg);
    padding: var(--space-3); z-index: 2000; display: none;
  }
  #filter-panel.open { display: block; }
  .filter-option {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 4px; cursor: pointer; border-radius: var(--radius-sm);
    transition: background 0.12s; font-size: var(--text-xs); color: var(--color-text);
  }
  .filter-option:hover { background: #f5f7fb; }
  .filter-dot { width: 12px; height: 12px; border-radius: 50%; border: 1.5px solid rgba(0,0,0,0.18); flex-shrink: 0; }
  .filter-option input[type="checkbox"] { accent-color: var(--color-primary); width: 14px; height: 14px; }

  #toolbar-right { margin-left: auto; display: flex; align-items: center; gap: var(--space-2); flex-shrink: 0; }
  #count-badge {
    font-size: var(--text-xs); color: var(--color-text-muted);
    background: rgba(0,0,0,0.05); border-radius: var(--radius-full);
    padding: 4px 10px; white-space: nowrap;
  }
  #satellite-btn, #reset-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 6px 12px; border: 1.5px solid var(--color-divider);
    border-radius: var(--radius-full); font-size: var(--text-xs);
    font-family: var(--font-body); background: rgba(255,255,255,0.7);
    color: var(--color-text); cursor: pointer; white-space: nowrap;
    transition: border 0.18s, background 0.18s, color 0.18s;
  }
  #satellite-btn:hover, #reset-btn:hover { border-color: var(--color-primary); background: #fff; }
  #satellite-btn.active { background: #1a2340; color: #fff; border-color: #1a2340; }
  #reset-btn:hover { border-color: #e05252; color: #e05252; }

  #map { position: fixed; top: 58px; left: 0; right: 0; bottom: 0; z-index: 1; }

  .leaflet-popup-content-wrapper {
    border-radius: 12px !important; box-shadow: 0 8px 32px rgba(0,0,0,0.18) !important;
    padding: 0 !important; overflow: hidden; min-width: 280px; max-width: 340px;
    font-family: var(--font-body) !important;
  }
  .leaflet-popup-content { margin: 0 !important; width: auto !important; }
  .popup-header { padding: 13px 16px 10px; background: #f7f9fc; border-bottom: 1px solid #e8edf4; }
  .popup-address { font-size: 13px; font-weight: 700; color: #1e2229; line-height: 1.3; margin-bottom: 4px; }
  .popup-type-badge {
    display: inline-block; padding: 2px 9px; border-radius: 99px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.02em;
  }
  .popup-body { padding: 10px 16px 13px; }
  .popup-row {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 3.5px 0; border-bottom: 1px solid #f0f2f6; gap: 10px;
  }
  .popup-row:last-child { border-bottom: none; }
  .popup-label { font-size: 11px; color: #888d9b; font-weight: 500; flex-shrink: 0; }
  .popup-value { font-size: 11.5px; color: #1e2229; font-weight: 500; text-align: right; max-width: 62%; word-break: break-word; }
  .popup-notes { margin-top: 8px; padding: 7px 10px; background: #f7f9fc; border-radius: 7px; font-size: 11px; color: #4a5060; font-style: italic; }
  .popup-link { display: block; margin-top: 8px; font-size: 11px; color: var(--color-primary); text-decoration: none; }
  .popup-link:hover { text-decoration: underline; }

  #legend {
    position: fixed; bottom: 22px; right: 18px; z-index: 900;
    background: rgba(255,255,255,0.92); backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(0,0,0,0.09); border-radius: 10px;
    padding: 11px 15px; box-shadow: var(--shadow-md); font-family: var(--font-body);
  }
  .legend-title { font-size: 10px; font-weight: 700; color: #888d9b; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
  .legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 11.5px; color: #1e2229; }
  .legend-row:last-child { margin-bottom: 0; }
  .legend-pin { width: 14px; height: 19px; flex-shrink: 0; }

  #loading-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: rgba(255,255,255,0.92); backdrop-filter: blur(8px);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; transition: opacity 0.5s;
  }
  #loading-overlay.fade-out { opacity: 0; pointer-events: none; }
  .loader-spinner {
    width: 38px; height: 38px; border: 3.5px solid #e2e8f0;
    border-top-color: var(--color-primary); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader-text { font-size: 14px; color: var(--color-text-muted); font-family: var(--font-body); }

  body.satellite-mode #toolbar { background: rgba(15,20,36,0.90); --toolbar-border: rgba(255,255,255,0.10); }
  body.satellite-mode #toolbar-title { color: #fff; }
  body.satellite-mode #search-input { background: rgba(255,255,255,0.12); color: #fff; border-color: rgba(255,255,255,0.18); }
  body.satellite-mode #search-input::placeholder { color: rgba(255,255,255,0.45); }
  body.satellite-mode #filter-btn, body.satellite-mode #reset-btn { background: rgba(255,255,255,0.10); color: #fff; border-color: rgba(255,255,255,0.18); }
  body.satellite-mode #count-badge { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.7); }
  body.satellite-mode #legend { background: rgba(15,20,36,0.90); border-color: rgba(255,255,255,0.12); }
  body.satellite-mode .legend-title { color: rgba(255,255,255,0.55); }
  body.satellite-mode .legend-row { color: #fff; }
  body.satellite-mode #filter-panel { background: #1a2340; border-color: rgba(255,255,255,0.15); }
  body.satellite-mode .filter-option { color: #fff; }
  body.satellite-mode .filter-option:hover { background: rgba(255,255,255,0.08); }

  .custom-pin-wrapper { background: none !important; border: none !important; }

  @media (max-width: 600px) {
    #toolbar { gap: var(--space-2); padding: 0 var(--space-3); height: 52px; }
    #map { top: 52px; }
    #toolbar-title span { display: none; }
    #search-wrap { max-width: 130px; }
    #satellite-btn span, #reset-btn span { display: none; }
  }
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="loader-spinner"></div>
  <div class="loader-text">Loading properties…</div>
</div>

<div id="toolbar">
  <div id="toolbar-title">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <rect x="3" y="3" width="18" height="18" rx="4" fill="#3a7bd5" opacity="0.15"/>
      <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="#3a7bd5"/>
      <circle cx="12" cy="9" r="2.5" fill="#fff"/>
    </svg>
    <span>TX Reonomy Master Export</span>
  </div>

  <div id="search-wrap">
    <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search-input" placeholder="Search address, owner…" autocomplete="off">
    <button id="search-clear" aria-label="Clear">✕</button>
    <div id="search-dropdown"></div>
  </div>

  <div id="filter-wrap">
    <button id="filter-btn" aria-label="Filter by property type">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
      Filter <span id="filter-badge"></span>
    </button>
    <div id="filter-panel">
      <div style="font-size:11px;font-weight:700;color:#888d9b;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;">Property Type</div>
    </div>
  </div>

  <div id="toolbar-right">
    <div id="count-badge">Loading…</div>
    <button id="satellite-btn" aria-label="Toggle satellite">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      <span>Satellite</span>
    </button>
    <button id="reset-btn" aria-label="Reset map">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
      <span>Reset</span>
    </button>
  </div>
</div>

<div id="map"></div>

<div id="legend">
  <div class="legend-title">Property Type</div>
  <div class="legend-row">
    <svg class="legend-pin" viewBox="0 0 22 30" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="lg-hl-b" cx="30%" cy="25%" r="60%"><stop offset="0%" stop-color="#fff" stop-opacity="0.60"/><stop offset="100%" stop-color="#fff" stop-opacity="0"/></radialGradient>
        <filter id="lg-ds-b" x="-40%" y="-20%" width="200%" height="180%"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.30"/></filter>
      </defs>
      <g filter="url(#lg-ds-b)" opacity="0.93">
        <path d="M11 1C6.03 1 2 5.16 2 10.33c0 7.17 9 18.17 9 18.17s9-11 9-18.17C20 5.16 15.97 1 11 1z" fill="#B8C8D8" stroke="#6a9ab5" stroke-width="2"/>
        <path d="M11 1C6.03 1 2 5.16 2 10.33c0 7.17 9 18.17 9 18.17s9-11 9-18.17C20 5.16 15.97 1 11 1z" fill="url(#lg-hl-b)"/>
        <circle cx="11" cy="10.5" r="3.2" fill="#fff" stroke="#6a9ab5" stroke-width="1.5"/>
      </g>
    </svg>
    Building
  </div>
  <div class="legend-row">
    <svg class="legend-pin" viewBox="0 0 22 30" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="lg-hl-l" cx="30%" cy="25%" r="60%"><stop offset="0%" stop-color="#fff" stop-opacity="0.60"/><stop offset="100%" stop-color="#fff" stop-opacity="0"/></radialGradient>
        <filter id="lg-ds-l" x="-40%" y="-20%" width="200%" height="180%"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.30"/></filter>
      </defs>
      <g filter="url(#lg-ds-l)" opacity="0.93">
        <path d="M11 1C6.03 1 2 5.16 2 10.33c0 7.17 9 18.17 9 18.17s9-11 9-18.17C20 5.16 15.97 1 11 1z" fill="#A8C5A0" stroke="#5a9052" stroke-width="2"/>
        <path d="M11 1C6.03 1 2 5.16 2 10.33c0 7.17 9 18.17 9 18.17s9-11 9-18.17C20 5.16 15.97 1 11 1z" fill="url(#lg-hl-l)"/>
        <circle cx="11" cy="10.5" r="3.2" fill="#fff" stroke="#5a9052" stroke-width="1.5"/>
      </g>
    </svg>
    Land
  </div>
  <div class="legend-row">
    <svg class="legend-pin" viewBox="0 0 22 30" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="lg-hl-t" cx="30%" cy="25%" r="60%"><stop offset="0%" stop-color="#fff" stop-opacity="0.60"/><stop offset="100%" stop-color="#fff" stop-opacity="0"/></radialGradient>
        <filter id="lg-ds-t" x="-40%" y="-20%" width="200%" height="180%"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.30"/></filter>
      </defs>
      <g filter="url(#lg-ds-t)" opacity="0.93">
        <path d="M11 1C6.03 1 2 5.16 2 10.33c0 7.17 9 18.17 9 18.17s9-11 9-18.17C20 5.16 15.97 1 11 1z" fill="#F5E6A3" stroke="#b89a28" stroke-width="2"/>
        <path d="M11 1C6.03 1 2 5.16 2 10.33c0 7.17 9 18.17 9 18.17s9-11 9-18.17C20 5.16 15.97 1 11 1z" fill="url(#lg-hl-t)"/>
        <circle cx="11" cy="10.5" r="3.2" fill="#fff" stroke="#b89a28" stroke-width="1.5"/>
      </g>
    </svg>
    Truckstop / Highway
  </div>
  <div class="legend-row">
    <svg class="legend-pin" viewBox="0 0 22 30" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="lg-hl-p" cx="30%" cy="25%" r="60%"><stop offset="0%" stop-color="#fff" stop-opacity="0.60"/><stop offset="100%" stop-color="#fff" stop-opacity="0"/></radialGradient>
        <filter id="lg-ds-p" x="-40%" y="-20%" width="200%" height="180%"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.30"/></filter>
      </defs>
      <g filter="url(#lg-ds-p)" opacity="0.93">
        <path d="M11 1C6.03 1 2 5.16 2 10.33c0 7.17 9 18.17 9 18.17s9-11 9-18.17C20 5.16 15.97 1 11 1z" fill="#F4A56A" stroke="#b86538" stroke-width="2"/>
        <path d="M11 1C6.03 1 2 5.16 2 10.33c0 7.17 9 18.17 9 18.17s9-11 9-18.17C20 5.16 15.97 1 11 1z" fill="url(#lg-hl-p)"/>
        <circle cx="11" cy="10.5" r="3.2" fill="#fff" stroke="#b86538" stroke-width="1.5"/>
      </g>
    </svg>
    Pending
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwmLsSuejAnJdXWgqeAyiI0QB44MKAypi9xcjQ25K0oyX7B72QoIvxNukWkXRxZNwA6cg/exec";
const DEFAULT_CENTER = [31.5, -99.0];
const DEFAULT_ZOOM = 6;
const REFRESH_MS = 5 * 60 * 1000;
const FLY_DURATION = 1.2;
const SHEET_NAMES = ["Buildings", "Land", "Highway"];

// Map init
const map = L.map("map", { center: DEFAULT_CENTER, zoom: DEFAULT_ZOOM, zoomControl: true, attributionControl: false });

// Panes
map.createPane("labelsPane");
map.getPane("labelsPane").style.zIndex = 450;
map.getPane("labelsPane").style.pointerEvents = "none";

// Tile layers
const voyagerBase = L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png", {
  maxZoom: 20, subdomains: "abcd", attribution: "CARTO Voyager"
}).addTo(map);

const voyagerLabels = L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager_only_labels/{z}/{x}/{y}{r}.png", {
  maxZoom: 20, subdomains: "abcd", pane: "labelsPane"
}).addTo(map);

const satBase = L.tileLayer("https://mt{s}.google.com/vt/lyrs=s&hl=en&x={x}&y={y}&z={z}", {
  maxZoom: 20, subdomains: ["0","1","2","3"]
});
const satLabels = L.tileLayer("https://mt{s}.google.com/vt/lyrs=h&hl=en&x={x}&y={y}&z={z}", {
  maxZoom: 20, subdomains: ["0","1","2","3"], pane: "labelsPane"
});

let isSatellite = false;

// Pin color logic
function getPinColors(propType, sheet) {
  const t = String(propType || sheet || "").toLowerCase();
  if (t.includes("building") || sheet === "Buildings") return { fill: "#B8C8D8", dark: "#6a9ab5", light: "#ddeaf5", label: "Building" };
  if (t.includes("land") || sheet === "Land") return { fill: "#A8C5A0", dark: "#5a9052", light: "#d2e8ce", label: "Land" };
  if (t.includes("truck") || t.includes("highway") || sheet === "Highway") return { fill: "#F5E6A3", dark: "#b89a28", light: "#fdf5d5", label: "Truckstop" };
  if (t.includes("pending")) return { fill: "#F4A56A", dark: "#b86538", light: "#fde8d5", label: "Pending" };
  return { fill: "#B8C8D8", dark: "#6a9ab5", light: "#ddeaf5", label: "Other" };
}

function makePinHTML(colors) {
  const uid = "p" + Math.random().toString(36).slice(2, 9);
  const path = "M11 1C6.03 1 2 5.16 2 10.33c0 7.17 9 18.17 9 18.17s9-11 9-18.17C20 5.16 15.97 1 11 1z";

  if (isSatellite) {
    // Satellite: white glow halo (Gaussian blur std=4, white color matrix 90% opacity) + white stroke
    return `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="38" viewBox="0 0 22 30">
      <defs>
        <filter id="glow_${uid}" x="-80%" y="-60%" width="260%" height="240%" color-interpolation-filters="sRGB">
          <feFlood flood-color="#ffffff" flood-opacity="0.9" result="color"/>
          <feComposite in="color" in2="SourceGraphic" operator="in" result="colorSrc"/>
          <feGaussianBlur in="colorSrc" stdDeviation="4" result="glow"/>
          <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <g filter="url(#glow_${uid})" opacity="0.93">
        <path d="${path}" fill="${colors.fill}" stroke="#ffffff" stroke-width="2"/>
        <circle cx="11" cy="10.5" r="3.2" fill="#ffffff" stroke="${colors.dark}" stroke-width="1.5"/>
      </g>
    </svg>`;
  }

  // Normal map: flat fill + radial gradient highlight (white 60% top-left) + drop shadow
  return `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="38" viewBox="0 0 22 30">
    <defs>
      <radialGradient id="hl_${uid}" cx="30%" cy="25%" r="60%" gradientUnits="objectBoundingBox">
        <stop offset="0%" stop-color="#ffffff" stop-opacity="0.60"/>
        <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      </radialGradient>
      <filter id="ds_${uid}" x="-40%" y="-20%" width="200%" height="180%" color-interpolation-filters="sRGB">
        <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.30"/>
      </filter>
    </defs>
    <g filter="url(#ds_${uid})" opacity="0.93">
      <path d="${path}" fill="${colors.fill}" stroke="${colors.dark}" stroke-width="2"/>
      <path d="${path}" fill="url(#hl_${uid})"/>
      <circle cx="11" cy="10.5" r="3.2" fill="#ffffff" stroke="${colors.dark}" stroke-width="1.5"/>
    </g>
  </svg>`;
}

function makeIcon(colors) {
  return L.divIcon({
    className: "custom-pin-wrapper",
    html: makePinHTML(colors),
    iconSize: [28, 38], iconAnchor: [14, 38], popupAnchor: [0, -42]
  });
}

// State
let allProperties = [];
let renderedMarkers = [];
let activeFilters = new Set();
let typeSet = new Set();
const markerLayer = L.layerGroup().addTo(map);

// Format helpers
const fmt = v => (v !== null && v !== undefined && String(v).trim()) ? String(v).trim() : null;
function fmtMoney(v) {
  if (!v) return null;
  const n = parseFloat(String(v).replace(/[,$]/g,""));
  return isNaN(n) ? fmt(v) : "$" + n.toLocaleString("en-US");
}
function fmtSF(v) {
  if (!v) return null;
  const n = parseFloat(v);
  return isNaN(n) ? fmt(v) : n.toLocaleString("en-US") + " sf";
}
function fmtDate(v) {
  if (!v) return null;
  const d = new Date(v);
  if (isNaN(d)) return fmt(v);
  return d.toLocaleDateString("en-US", { month: "long", day: "2-digit", year: "numeric" });
}

// Popup builder
function buildPopup(p) {
  const addr = fmt(p["ADDRESS Full"] || p["ADDRESS LINE"]) || "Unknown Address";
  const cityState = [fmt(p.CITY), fmt(p.STATE)].filter(Boolean).join(", ");
  const ptype = fmt(p.property_type || p.property_subtype || p._sheet) || "Unknown";
  const colors = getPinColors(ptype, p._sheet);

  const fields = [
    ["Type", fmt(p.property_type)],
    ["Subtype", fmt(p.property_subtype)],
    ["Lot Area", fmtSF(p.lot_area)],
    ["Bldg Area", fmtSF(p.gross_building_area)],
    ["Lot Use", fmt(p.lot_use_category)],
    ["Year Built", fmt(p.year_built)],
    ["Stories", fmt(p.stories)],
    ["Zoning", fmt(p.zoning)],
    ["Total Units", fmt(p.total_units)],
    ["Opp. Zone", fmt(p.opportunity_zone) ? (["true","yes","1"].includes(String(p.opportunity_zone).toLowerCase()) ? "Yes" : "No") : null],
    ["Owner", fmt(p.reported_owner_name)],
    ["Sale Amt", fmtMoney(p.sale_amount)],
    ["Sale Date", fmtDate(p.sale_executed_date || p.sale_recorded_date)],
    ["Buyer", fmt(p.sale_buyer_name)],
    ["$/SF", fmt(p.sales_price_per_sf) ? "$" + parseFloat(p.sales_price_per_sf).toFixed(2) : null],
    ["$/Acre", fmtMoney(p.price_per_acre_lot_area)],
    ["County", fmt(p.county)],
    ["MSA", fmt(p.msa_name)],
    ["APN", fmt(p.apn)],
  ].filter(r => r[1]);

  const notes = [p.note_1, p.note_2, p.note_3].filter(Boolean).join(" · ");
  const labels = [p.label_1, p.label_2, p.label_3].filter(Boolean).join(", ");
  const link = fmt(p.LINK);

  let html = `<div class="popup-header">
    <div class="popup-address">${addr}${cityState ? `<div style="font-size:11px;font-weight:500;color:#888d9b;margin-top:2px;">${cityState}</div>` : ""}</div>
    <span class="popup-type-badge" style="background:${colors.fill};color:${colors.dark};border:1px solid ${colors.dark}30;">${ptype}</span>
    ${labels ? `<div style="font-size:10px;color:#888d9b;margin-top:4px;">🏷 ${labels}</div>` : ""}
  </div><div class="popup-body">`;

  fields.forEach(([lbl, val]) => {
    html += `<div class="popup-row"><span class="popup-label">${lbl}</span><span class="popup-value">${val}</span></div>`;
  });

  if (notes) html += `<div class="popup-notes">📝 ${notes}</div>`;
  if (link) html += `<a class="popup-link" href="${link}" target="_blank" rel="noopener noreferrer">🔗 View on Reonomy ↗</a>`;

  html += `</div>`;
  return html;
}

// Render markers
function renderMarkers() {
  markerLayer.clearLayers();
  renderedMarkers = [];

  let count = 0;
  allProperties.forEach(p => {
    if (activeFilters.size > 0 && !activeFilters.has(p._ptype)) return;
    const lat = parseFloat(p.latitude), lng = parseFloat(p.longitude);
    if (isNaN(lat) || isNaN(lng)) return;

    const colors = getPinColors(p._ptype, p._sheet);
    const marker = L.marker([lat, lng], { icon: makeIcon(colors) });
    marker._p = p; marker._colors = colors;

    marker.on("click", function() {
      const ml = this.getLatLng();
      map.flyTo([ml.lat, ml.lng], Math.max(map.getZoom(), 14), { duration: FLY_DURATION, easeLinearity: 0.25 });
      const m = this;
      setTimeout(() => {
        m.bindPopup(buildPopup(m._p), { maxWidth: 340, minWidth: 280, autoPanPadding: [40, 40] }).openPopup();
      }, FLY_DURATION * 900);
    });

    markerLayer.addLayer(marker);
    renderedMarkers.push(marker);
    count++;
  });

  document.getElementById("count-badge").textContent = count.toLocaleString() + " properties";
}

function refreshIcons() {
  renderedMarkers.forEach(m => { if (m._colors) m.setIcon(makeIcon(m._colors)); });
}

// Fetch data
async function fetchData() {
  try {
    const url = APPS_SCRIPT_URL + (APPS_SCRIPT_URL.includes("?") ? "&" : "?") + "t=" + Date.now();
    const res = await fetch(url);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const json = await res.json();

    allProperties = [];
    typeSet = new Set();

    SHEET_NAMES.forEach(sheet => {
      const rows = json[sheet] || json[sheet.toLowerCase()] || [];
      rows.forEach(row => {
        const p = Object.assign({}, row, { _sheet: sheet });
        const ptype = fmt(p.property_type || p.property_subtype || sheet) || "Unknown";
        p._ptype = ptype;
        typeSet.add(ptype);
        allProperties.push(p);
      });
    });

    buildFilterUI();
    renderMarkers();

    const ov = document.getElementById("loading-overlay");
    if (ov) { ov.classList.add("fade-out"); setTimeout(() => ov.remove(), 600); }

  } catch (err) {
    const lt = document.querySelector(".loader-text");
    if (lt) lt.textContent = "Error loading data — check your Apps Script URL & deployment.";
    console.error("Fetch error:", err);
  }
}

// Filter UI
function buildFilterUI() {
  const panel = document.getElementById("filter-panel");
  const titleEl = panel.querySelector("div");
  panel.innerHTML = "";
  panel.appendChild(titleEl);

  Array.from(typeSet).sort().forEach(type => {
    const colors = getPinColors(type, null);
    const lbl = document.createElement("label");
    lbl.className = "filter-option";
    lbl.innerHTML = `
      <input type="checkbox" value="${type}" checked>
      <span class="filter-dot" style="background:${colors.fill};border-color:${colors.dark};"></span>
      <span>${type}</span>`;
    lbl.querySelector("input").addEventListener("change", function() {
      if (this.checked) activeFilters.delete(type);
      else activeFilters.add(type);
      updateFilterBadge();
      renderMarkers();
    });
    panel.appendChild(lbl);
  });
}

function updateFilterBadge() {
  const b = document.getElementById("filter-badge");
  b.textContent = activeFilters.size || "";
  b.style.display = activeFilters.size ? "inline" : "none";
}

// Search
const searchInput = document.getElementById("search-input");
const searchDD = document.getElementById("search-dropdown");
const searchClear = document.getElementById("search-clear");

searchInput.addEventListener("input", function() {
  const q = this.value.trim().toLowerCase();
  searchClear.style.display = q ? "block" : "none";
  if (!q) { searchDD.style.display = "none"; return; }

  const matches = allProperties.filter(p => {
    return [p["ADDRESS Full"], p["ADDRESS LINE"], p.CITY, p.reported_owner_name, p.contact_name]
      .some(v => v && String(v).toLowerCase().includes(q));
  }).slice(0, 14);

  if (!matches.length) {
    searchDD.innerHTML = `<div class="search-result-item" id="gmaps-fallback">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      Search <strong style="margin-left:3px;">"${this.value}"</strong> on Google Maps
    </div>`;
    document.getElementById("gmaps-fallback").onclick = () => {
      window.open("https://www.google.com/maps/search/?q=" + encodeURIComponent(searchInput.value), "_blank", "noopener");
    };
  } else {
    searchDD.innerHTML = matches.map((p, i) => {
      const addr = p["ADDRESS Full"] || p["ADDRESS LINE"] || "Unknown";
      const detail = [p.CITY, p.STATE, p._ptype].filter(Boolean).join(" · ");
      const c = getPinColors(p._ptype, p._sheet);
      const uid = "sri" + i;
      const pinSVG = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="19" viewBox="0 0 22 30" style="flex-shrink:0;margin-top:1px;">
        <defs>
          <radialGradient id="sh_${uid}" cx="30%" cy="25%" r="60%"><stop offset="0%" stop-color="#fff" stop-opacity="0.60"/><stop offset="100%" stop-color="#fff" stop-opacity="0"/></radialGradient>
          <filter id="sd_${uid}" x="-40%" y="-20%" width="200%" height="180%"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.25"/></filter>
        </defs>
        <g filter="url(#sd_${uid})" opacity="0.93">
          <path d="M11 1C6.03 1 2 5.16 2 10.33c0 7.17 9 18.17 9 18.17s9-11 9-18.17C20 5.16 15.97 1 11 1z" fill="${c.fill}" stroke="${c.dark}" stroke-width="2"/>
          <path d="M11 1C6.03 1 2 5.16 2 10.33c0 7.17 9 18.17 9 18.17s9-11 9-18.17C20 5.16 15.97 1 11 1z" fill="url(#sh_${uid})"/>
          <circle cx="11" cy="10.5" r="3.2" fill="#fff" stroke="${c.dark}" stroke-width="1.5"/>
        </g>
      </svg>`;
      return `<div class="search-result-item" data-mi="${i}">
        ${pinSVG}
        <div><div style="font-size:12px;line-height:1.3;">${addr}</div><div class="sri-type">${detail}</div></div>
      </div>`;
    }).join("");

    searchDD.querySelectorAll("[data-mi]").forEach(el => {
      el.addEventListener("click", () => {
        const p = matches[+el.dataset.mi];
        const lat = parseFloat(p.latitude), lng = parseFloat(p.longitude);
        if (!isNaN(lat) && !isNaN(lng)) {
          searchDD.style.display = "none";
          searchInput.value = p["ADDRESS Full"] || p["ADDRESS LINE"] || "";
          searchClear.style.display = "block";
          map.flyTo([lat, lng], 16, { duration: FLY_DURATION });
          setTimeout(() => {
            renderedMarkers.forEach(m => {
              const ml = m.getLatLng();
              if (Math.abs(ml.lat - lat) < 0.0002 && Math.abs(ml.lng - lng) < 0.0002) {
                m.bindPopup(buildPopup(m._p), { maxWidth: 340, minWidth: 280 }).openPopup();
              }
            });
          }, FLY_DURATION * 1000);
        }
      });
    });
  }
  searchDD.style.display = "block";
});

searchClear.addEventListener("click", () => {
  searchInput.value = ""; searchClear.style.display = "none"; searchDD.style.display = "none";
});
document.addEventListener("click", e => {
  if (!document.getElementById("search-wrap").contains(e.target)) searchDD.style.display = "none";
});

// Filter panel toggle
document.getElementById("filter-btn").addEventListener("click", e => {
  e.stopPropagation();
  document.getElementById("filter-panel").classList.toggle("open");
});
document.addEventListener("click", e => {
  if (!document.getElementById("filter-wrap").contains(e.target))
    document.getElementById("filter-panel").classList.remove("open");
});

// Satellite toggle
document.getElementById("satellite-btn").addEventListener("click", () => {
  isSatellite = !isSatellite;
  document.getElementById("satellite-btn").classList.toggle("active", isSatellite);
  if (isSatellite) {
    map.removeLayer(voyagerBase); map.removeLayer(voyagerLabels);
    satBase.addTo(map); satLabels.addTo(map);
    document.body.classList.add("satellite-mode");
  } else {
    map.removeLayer(satBase); map.removeLayer(satLabels);
    voyagerBase.addTo(map); voyagerLabels.addTo(map);
    document.body.classList.remove("satellite-mode");
  }
  refreshIcons();
});

// Reset
document.getElementById("reset-btn").addEventListener("click", () => {
  map.flyTo(DEFAULT_CENTER, DEFAULT_ZOOM, { duration: FLY_DURATION });
  map.closePopup();
  searchInput.value = ""; searchClear.style.display = "none"; searchDD.style.display = "none";
  activeFilters.clear();
  document.querySelectorAll("#filter-panel input[type=checkbox]").forEach(cb => cb.checked = true);
  updateFilterBadge();
  renderMarkers();
});

// Init
fetchData();
setInterval(fetchData, REFRESH_MS);
</script>
</body>
</html>
